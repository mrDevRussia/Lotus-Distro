name: Build Lotus ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# إعطاء الصلاحية لإنشاء إصدارات (Releases)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm archiso git

    - name: Prepare Lotus Profile
      run: |
        mkdir -p /tmp/lotus
        cp -r /usr/share/archiso/configs/releng/* /tmp/lotus/
        # استبدال قائمة الحزم
        cp packages.x86_64 /tmp/lotus/packages.x86_64

    - name: Build ISO
      run: |
        cd /tmp/lotus
        mkarchiso -v -w /tmp/archiso-limit -o /tmp/out .

    - name: Upload ISO to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: Lotus-Nightly-${{ github.run_number }}
        name: Lotus OS - Nightly Build #${{ github.run_number }}
        files: /tmp/out/*.iso
        body: "النسخة الخام والتجريبية الأولى من نظام Lotus 🚀"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
